<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چوونەژوورەوە - Pay Time Tour</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="text-center mb-4">
                <h2 class="text-primary">Pay Time Tour</h2>
                <p class="text-muted">سیستەمی بەڕێوەبردنی ئامادەبوون</p>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">ئیمەیڵ</label>
                    <input type="email" class="form-control" id="email" placeholder="admin@paytime.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">تێپەڕەوشە</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label">لەبیرم مەکە</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">چوونەژوورەوە</button>
            </form>
            <div class="text-center mt-3">
                <small class="text-muted">Demo: admin@paytime.com / admin123</small>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Demo login - لە وەشانی ڕاستەقینەدا دەبێت بە backend بگەڕێت
            if(email === 'admin@paytime.com' && password === 'admin123') {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userName', 'بەڕێوەبەری سیستەم');
                window.location.href = 'dashboard.html';
            } else {
                alert('ئیمەیڵ یان تێپەڕەوشە هەڵەیە');
            }
        });
    </script>
</body>
</html>
